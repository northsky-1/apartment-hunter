name: Daily apartment hunt

on:
  schedule:
    # Runs every day at 06:15 UTC = 08:15 Helsinki winter time / 09:15 summer time
    - cron: "15 6 * * *"
  workflow_dispatch:   # lets you trigger a run manually from the Actions tab

permissions:
  contents: write       # so the job can commit the new report back to the repo
  pages: write
  id-token: write

concurrency:
  group: "daily"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch-and-report:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run apartment hunter
        run: python3 apartment_hunter.py
        env:
          PYTHONUNBUFFERED: "1"

      - name: Commit updated report and seen-list
        run: |
          git config user.name "apartment-hunter-bot"
          git config user.email "apartment-hunter-bot@users.noreply.github.com"
          git add docs/ seen_listings.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily report $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy-pages:
    needs: fetch-and-report
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
